<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DYMO Label Editor</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Narrow:wght@400;700&family=Barlow+Condensed:wght@400;700&family=Bebas+Neue&family=Courier+Prime&family=Dancing+Script&family=Fjalla+One&family=Inter:wght@400;700&family=Lato:wght@400;700&family=Lobster&family=Montserrat:wght@400;700&family=Nunito&family=Open+Sans&family=Oswald&family=Pacifico&family=Permanent+Marker&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Righteous&family=Roboto&family=Share+Tech+Mono&family=Ubuntu&family=VT323&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script>
  (function() {
    var desc = Object.getOwnPropertyDescriptor(CanvasRenderingContext2D.prototype, 'textBaseline');
    if (desc && desc.set) {
      Object.defineProperty(CanvasRenderingContext2D.prototype, 'textBaseline', {
        set: function(v) { desc.set.call(this, v === 'alphabetical' ? 'alphabetic' : v); },
        get: function()  { return desc.get.call(this); }
      });
    }
  })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>&#127991; DYMO Label Editor</h1>
    <label>Printer:</label>
    <select id="printer-select"><option value="">&#8212; none &#8212;</option></select>
    <button id="btn-scan" title="Scan for printers">&#128269; Scan</button>
    <label>Stretch:</label>
    <input type="range" id="stretch" min="1" max="4" value="2" style="width:80px">
    <span id="stretch-val">2&#215;</span>
    <button id="btn-print" title="Print label">&#128424; Print</button>
    <div class="spacer"></div>
    <label>Width (px):</label>
    <input type="number" id="canvas-width" value="200" min="30" max="2000" style="width:70px">
    <button id="btn-save">&#128190; Save</button>
    <button id="btn-load">&#128194; Load</button>
    <button id="btn-export-json">&#11015; JSON</button>
    <button id="btn-import-json">&#11014; JSON</button>
    <button id="btn-export-png">&#11015; PNG</button>
    <button id="btn-export-svg">&#11015; SVG</button>
  </div>
  <div class="sidebar left">
    <h3>Text</h3>
    <label>Font</label>
    <div id="font-family-picker"></div>
    <label>Size (px)</label>
    <input type="number" id="font-size" value="20" min="4" max="30">
    <div class="btn-row">
      <button id="btn-bold">B</button>
      <button id="btn-italic">I</button>
      <button id="btn-add-text">+ Add Text</button>
    </div>
<h3>Shapes</h3>
    <div class="btn-row">
      <button class="shape-btn" data-shape="rect" title="Rectangle">&#9645;</button>
      <button class="shape-btn" data-shape="circle" title="Circle">&#9679;</button>
      <button class="shape-btn" data-shape="ellipse" title="Ellipse">&#11052;</button>
      <button class="shape-btn" data-shape="line" title="Line">&#9585;</button>
      <button class="shape-btn" data-shape="triangle" title="Triangle">&#9650;</button>
      <button class="shape-btn" data-shape="arrow" title="Arrow">&#8594;</button>
    </div>
    <h3>Free Draw</h3>
    <div class="btn-row">
      <button id="btn-draw">&#9999;&#65039; Draw</button>
      <button id="btn-draw-off">&#9995; Select</button>
    </div>
    <label>Brush Size</label>
    <input type="range" id="brush-size" min="1" max="8" value="2">
    <h3>QR / Barcode</h3>
    <input type="text" id="qr-text" placeholder="Enter text...">
    <div class="btn-row">
      <button id="btn-qr">+ QR Code</button>
      <button id="btn-barcode">+ Barcode</button>
    </div>
    <h3>Image Upload</h3>
    <input type="file" id="image-upload" accept="image/*">
    <h3>Material Icons</h3>
    <input type="text" id="icon-search" placeholder="e.g. home, star, wifi...">
    <div id="icon-results"></div>
  </div>
  <div id="center">
    <div id="canvas-scroll">
      <div id="canvas-wrapper">
        <canvas id="label-canvas"></canvas>
      </div>
    </div>
    <div id="preview-section">
      <h4>Live Preview (actual size with stretch)</h4>
      <canvas id="preview-canvas"></canvas>
    </div>
  </div>
  <div class="sidebar right">
    <h3>Layers</h3>
    <ul id="layer-list"></ul>
    <div class="btn-row" style="margin-top:8px;">
      <button id="btn-layer-up">&#11014;</button>
      <button id="btn-layer-down">&#11015;</button>
      <button id="btn-layer-del">&#128465;</button>
    </div>
  </div>
</div>
<input type="file" id="import-json-input" accept=".json" class="hidden">
<script src="/static/app.js"></script>
</body>
</html>
